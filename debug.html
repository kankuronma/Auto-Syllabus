<!DOCTYPE html>
<html>
<head><title>Debug Parser</title></head>
<body>
<h2>Upload TXT to Debug</h2>
<input type="file" id="fileUpload" accept=".txt" />
<button onclick="parse()">Parse</button>
<pre id="output"></pre>

<script>
function parse() {
  const file = document.getElementById('fileUpload').files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const lines = text.split('\n');
    let output = "Lines found: " + lines.length + "\n\n";
    output += "First 20 lines:\n";
    
    for(let i = 0; i < Math.min(20, lines.length); i++) {
      output += `${i+1}: "${lines[i]}"\n`;
    }
    
    output += "\nLooking for dates...\n";
    
    // Test date patterns
    const testPattern = /(January|February|March|April|May|June|July|August|September|October|November|December)\s+(\d{1,2})/i;
    
    for(let i = 0; i < lines.length; i++) {
      const match = lines[i].match(testPattern);
      if(match) {
        output += `✓ Line ${i+1} matched: "${match[0]}"\n`;
      }
    }
    
    document.getElementById('output').textContent = output;
  };
  reader.readAsText(file);
}
</script>
</body>
</html>
